<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a73e8" />
    <meta name="description" content="Project Cloud — tu almacenamiento en la nube auto-hosteado" />
    <title>Project Cloud</title>
    <script>
      // Aplica el tema antes de pintar para evitar flash (FOUC).
      (function () {
        try {
          var stored = localStorage.getItem('pc-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = stored === 'dark' || ((stored === 'system' || !stored) && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
